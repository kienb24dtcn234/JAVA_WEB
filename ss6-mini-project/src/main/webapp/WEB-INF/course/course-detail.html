<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body layout:decorate="~{layout/main-layout}">
<header style="text-align: center; padding: 16px; background-color: #f5f5f5;" >
  <h1>EDU-PATH</h1>
  <p>Lộ trình chinh phục tiếng Anh cho mọi cấp độ</p>
</header>

<nav style="padding: 10px 16px; background-color: #333; color: #fff;">
  <a th:href="@{/course/list}"
     style="color: #fff; margin-right: 16px; text-decoration: none;">
    Danh sách khóa học
  </a>
  <a th:href="@{/course/register-consult}"
     style="color: #fff; text-decoration: none;">
    Đăng ký tư vấn
  </a>
</nav>

<div layout:fragment="content">

  <h2 th:text="${course.name}"></h2>

  <div style="margin-top:20px; line-height:1.8;">

    <p><b>Mã khóa:</b> <span th:text="${course.id}"></span></p>
    <p><b>Trình độ:</b> <span th:text="${course.level}"></span></p>

    <p>
      <b>Học phí:</b>
      <span th:text="${#numbers.formatDecimal(course.price,0,'COMMA',0,'POINT')} + ' VNĐ'"></span>
    </p>

    <p><b>Mô tả:</b> <span th:text="${course.description}"></span></p>
    <p><b>Giảng viên:</b> <span th:text="${course.teacher}"></span></p>
    <p><b>Thời lượng:</b> <span th:text="${course.duration} + ' buổi'"></span></p>
    <p><b>Ngày khai giảng:</b> <span th:text="${course.startDate}"></span></p>
    <p><b>Số học viên:</b> <span th:text="${course.studentCount}"></span></p>

    <!-- HẾT CHỖ -->
    <p th:if="${course.full}" style="color:red; font-weight:bold;">
      HẾT CHỖ
    </p>

  </div>

  <!-- BACK -->
  <div style="margin-top:20px;">
    <a th:href="@{/course/list}" style="text-decoration:none;">
      ← Quay lại danh sách
    </a>
  </div>

</div>
<footer style="text-align: center; padding: 16px; background-color: #f5f5f5; margin-top: 32px;" >
  <small>© 2026 Edu-Path. All rights reserved.</small>
</footer>
</body>
</html>
