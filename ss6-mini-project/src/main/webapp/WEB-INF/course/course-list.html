<!DOCTYPE html>
<html lang="en"
      layout:decorate="~{layout/main-layout}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title>Danh sách khóa học</title>
</head>

<body>
<header style="text-align: center; padding: 16px; background-color: #f5f5f5;" >
    <h1>EDU-PATH</h1>
    <p>Lộ trình chinh phục tiếng Anh cho mọi cấp độ</p>
</header>

<nav style="padding: 10px 16px; background-color: #333; color: #fff;">
    <a th:href="@{/course/list}"
       style="color: #fff; margin-right: 16px; text-decoration: none;">
        Danh sách khóa học
    </a>
    <a th:href="@{/course/register-consult}"
       style="color: #fff; text-decoration: none;">
        Đăng ký tư vấn
    </a>
</nav>

<div layout:fragment="content">

    <h2 style="margin-bottom: 16px;">Danh sách khóa học</h2>

    <!-- FILTER -->
    <form method="get" th:action="@{/course/list}" style="margin-bottom:20px;">
        <select name="level">
            <option value="ALL">Tất cả</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>

        <input type="number" name="maxPrice" placeholder="Học phí tối đa">

        <button style="padding:6px 12px;">Lọc</button>
    </form>

    <!-- MESSAGE -->
    <p th:if="${success}" style="color:green;" th:text="${success}"></p>
    <p th:if="${error}" style="color:red;" th:text="${error}"></p>

    <!-- EMPTY -->
    <p th:if="${#lists.isEmpty(courses)}">
        Hiện chưa có lớp học phù hợp với trình độ này
    </p>

    <!-- TABLE -->
    <table style="width:100%; border-collapse: collapse; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">

        <tr style="background:#333; color:white;">
            <th style="padding:10px;">Tên khóa</th>
            <th>Level</th>
            <th>Học phí</th>
            <th>Giảng viên</th>
            <th>Action</th>
        </tr>

        <tr th:each="c : ${courses}" style="text-align:center;">
            <td th:text="${c.name}"></td>
            <td th:text="${c.level}"></td>

            <td th:text="${#numbers.formatDecimal(c.price,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>

            <td th:text="${c.teacher}"></td>

            <td>
                <a th:href="@{'/course/detail/' + ${c.id}}" style="color:blue;">Xem</a> |
                <a th:href="@{'/course/edit/' + ${c.id}}" style="color:orange;">Sửa</a> |

                <form th:action="@{'/course/delete/' + ${c.id}}"
                      method="post"
                      style="display:inline;"
                      onsubmit="return confirm('Bạn chắc chắn muốn xóa khóa học này?');">
                    <button style="color:red;">Xóa</button>
                </form>
            </td>
        </tr>

    </table>

</div>
<footer style="text-align: center; padding: 16px; background-color: #f5f5f5; margin-top: 32px;" >
    <small>© 2026 Edu-Path. All rights reserved.</small>
</footer>
</body>
</html>
